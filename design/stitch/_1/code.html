<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bead-grid {
            display: grid;
            grid-template-columns: repeat(24, minmax(0, 1fr));
            gap: 2px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #3525cd 0%, #4f46e5 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary-fixed-dim": "#c3c0ff",
                "surface-container-high": "#dce9ff",
                "surface-container-low": "#eff4ff",
                "on-secondary-fixed-variant": "#413f82",
                "secondary-container": "#b6b4ff",
                "primary-fixed": "#e2dfff",
                "secondary": "#58579b",
                "on-background": "#0b1c30",
                "surface-dim": "#cbdbf5",
                "tertiary": "#7e3000",
                "on-tertiary-container": "#ffd2be",
                "tertiary-container": "#a44100",
                "on-secondary": "#ffffff",
                "on-tertiary": "#ffffff",
                "background": "#f8f9ff",
                "surface-container-lowest": "#ffffff",
                "on-primary": "#ffffff",
                "secondary-fixed": "#e2dfff",
                "surface-variant": "#d3e4fe",
                "on-tertiary-fixed": "#351000",
                "tertiary-fixed": "#ffdbcc",
                "on-secondary-fixed": "#140f54",
                "on-primary-fixed": "#0f0069",
                "primary-container": "#4f46e5",
                "outline": "#777587",
                "on-error-container": "#93000a",
                "inverse-surface": "#213145",
                "outline-variant": "#c7c4d8",
                "surface-container": "#e5eeff",
                "on-error": "#ffffff",
                "inverse-primary": "#c3c0ff",
                "error": "#ba1a1a",
                "surface-tint": "#4d44e3",
                "on-primary-fixed-variant": "#3323cc",
                "surface-container-highest": "#d3e4fe",
                "surface-bright": "#f8f9ff",
                "surface": "#f8f9ff",
                "inverse-on-surface": "#eaf1ff",
                "on-secondary-container": "#454386",
                "primary": "#3525cd",
                "on-tertiary-fixed-variant": "#7b2f00",
                "on-surface": "#0b1c30",
                "secondary-fixed-dim": "#c3c0ff",
                "on-surface-variant": "#464555",
                "error-container": "#ffdad6",
                "tertiary-fixed-dim": "#ffb695",
                "on-primary-container": "#dad7ff"

              fontFamily: {
                "headline": ["Inter", "Noto Sans SC"],
                "body": ["Inter", "Noto Sans SC"],
                "label": ["Inter", "Noto Sans SC"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }
      </script>
</head>
<body class="bg-background text-on-surface min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#f8f9ff]/80 dark:bg-[#0b1c30]/80 backdrop-blur-xl border-b border-[#c7c4d8]/20 shadow-[0_24px_48px_-12px_rgba(11,28,48,0.08)]">
<div class="flex items-center gap-8">
<span class="text-lg font-bold tracking-tighter text-[#0b1c30] dark:text-[#f8f9ff] font-headline">沉浸拼装</span>
<nav class="hidden md:flex items-center gap-6 font-['Inter'] tracking-tight text-sm font-medium">
<button class="flex items-center gap-2 text-[#464555] hover:text-[#0b1c30] hover:bg-[#eff4ff] transition-colors duration-200 px-3 py-1.5 rounded-full group">
<span class="material-symbols-outlined text-lg" data-icon="arrow_back">arrow_back</span>
                    上一色
                </button>
<button class="flex items-center gap-2 text-[#4F46E5] font-semibold border-b-2 border-[#4F46E5] px-3 py-1.5 rounded-t-lg transition-colors duration-200">
                    下一色
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 mr-4">
<button class="p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="list_alt">list_alt</span>
</button>
</div>
<button class="primary-gradient text-on-primary font-bold px-6 py-2 rounded-full active:scale-95 duration-150 ease-in-out shadow-lg">
                退出拼装
            </button>
</div>
</header>
<!-- SideNavBar (Step Status) -->
<aside class="fixed left-0 top-16 h-[calc(100vh-64px)] w-64 z-40 bg-[#eff4ff] border-r border-[#c7c4d8]/20 flex flex-col">
<div class="p-6">
<h2 class="font-['Inter'] text-xs font-semibold uppercase tracking-widest text-[#464555] mb-1">步骤详情</h2>
<p class="text-sm font-bold text-[#4F46E5]">色号: #4F46E5</p>
</div>
<nav class="flex-1">
<div class="flex items-center gap-3 text-[#464555] pl-5 py-3 hover:bg-[#ffffff]/50 transition-all duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Inter'] text-xs font-semibold uppercase tracking-widest">图纸视图</span>
</div>
<div class="flex items-center gap-3 text-[#464555] pl-5 py-3 hover:bg-[#ffffff]/50 transition-all duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined" data-icon="format_list_numbered">format_list_numbered</span>
<span class="font-['Inter'] text-xs font-semibold uppercase tracking-widest">配色指南</span>
</div>
<div class="flex items-center gap-3 text-[#4F46E5] border-l-4 border-[#4F46E5] pl-4 py-3 bg-[#ffffff] transition-all duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-['Inter'] text-xs font-semibold uppercase tracking-widest">步骤进度</span>
</div>
<div class="flex items-center gap-3 text-[#464555] pl-5 py-3 hover:bg-[#ffffff]/50 transition-all duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
<span class="font-['Inter'] text-xs font-semibold uppercase tracking-widest">设置</span>
</div>
</nav>
<div class="p-6 mt-auto">
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-sm">
<p class="text-[10px] text-on-surface-variant uppercase tracking-tighter mb-2">当前进度</p>
<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full w-[42%]"></div>
</div>
<p class="text-right text-xs font-bold mt-2 text-primary">42 / 120 颗</p>
</div>
</div>
</aside>
<!-- Main Canvas Area -->
<main class="ml-64 pt-16 min-h-screen bg-surface flex items-center justify-center p-12">
<div class="relative group">
<!-- Pattern Name / Status Label -->
<div class="absolute -top-12 left-0 flex items-center gap-4">
<h1 class="text-2xl font-bold tracking-tight text-on-surface font-headline">沉浸拼装 - 拼豆图纸生成器</h1>
<span class="px-3 py-1 bg-primary-container text-on-primary-container text-xs font-bold rounded-full">当前聚焦：深靛蓝 #4F46E5</span>
</div>
<!-- The Grid Workspace -->
<div class="bg-surface-container-high p-4 rounded-xl shadow-inner ring-1 ring-outline-variant/20">
<div class="bead-grid bg-surface-container-lowest p-2 rounded-lg">
<!-- Generating a representative 24x24 grid via loop logic (simulated in HTML structure) -->
<!-- Row 1-24 Simplified visual representation -->
<div class="w-8 h-8 rounded-full bg-primary-container"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-primary-container"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-primary-container"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-primary-container"></div>
<div class="w-8 h-8 rounded-full bg-primary-container"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-primary-container"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant opacity-30"></div>
<script>
                        // Visual filler for the grid representation
                        const grid = document.querySelector('.bead-grid');
                        const totalCells = 24 * 16; // Showing a portion for UI demonstration
                        for(let i=0; i<totalCells; i++) {
                            const bead = document.createElement('div');
                            bead.className = 'w-8 h-8 rounded-full transition-all duration-300 cursor-pointer hover:ring-2 hover:ring-primary ring-offset-2';
                            // Logic: roughly 20% are the "active" color to demonstrate the focus mode
                            if (Math.random() > 0.8) {
                                bead.classList.add('bg-primary-container');
                            } else {
                                bead.classList.add('bg-surface-variant', 'opacity-20');
                            }
                            grid.appendChild(bead);
                        }
                    </script>
</div>
</div>
<!-- Floating Zoom/Pan Controls -->
<div class="absolute bottom-6 right-6 flex flex-col gap-2">
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-on-surface shadow-lg hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-on-surface shadow-lg hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-on-surface shadow-lg hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined" data-icon="fit_screen">fit_screen</span>
</button>
</div>
</div>
</main>
<!-- Bottom Instruction / Color Tray (Hidden in Mobile) -->
<div class="fixed bottom-0 left-64 right-0 h-24 bg-surface-container-lowest/80 backdrop-blur-md flex items-center px-12 gap-8 border-t border-outline-variant/10">
<div class="flex-shrink-0">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-1">选择聚焦颜色</span>
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary ring-4 ring-primary/20 cursor-pointer"></div>
<div class="w-8 h-8 rounded-full bg-[#f44336] cursor-pointer hover:scale-110 transition-transform"></div>
<div class="w-8 h-8 rounded-full bg-[#4caf50] cursor-pointer hover:scale-110 transition-transform"></div>
<div class="w-8 h-8 rounded-full bg-[#ffeb3b] cursor-pointer hover:scale-110 transition-transform"></div>

<div class="w-8 h-8 rounded-full bg-[#000000] cursor-pointer hover:scale-110 transition-transform"></div>
</div>
</div>
<div class="h-10 w-[1px] bg-outline-variant/30"></div>
<div class="flex-grow flex items-center justify-between">
<div>
<p class="text-sm font-bold text-on-surface">当前正在拼装：<span class="text-primary">深靛蓝 (Indigo #4F46E5)</span></p>
<p class="text-xs text-on-surface-variant">在此颜色完成前，其余颜色将保持半透明状态以协助对位。</p>
</div>
<div class="flex items-center gap-3">
<button class="px-6 py-2 rounded-full bg-surface-container-highest font-bold text-sm text-on-surface active:scale-95 transition-all">

</div>
</div>
</div>
</body></html>
